    code:`// ValueEntry.java
public class ValueEntry {
    public final String value;
    public final long expiresAt; // -1 = no expiry
    public ValueEntry(String value, long ttlMs) {
        this.value = value;
        this.expiresAt = ttlMs < 0 ? -1
            : System.currentTimeMillis() + ttlMs;
    }
    public boolean isExpired() {
        return expiresAt != -1
            && System.currentTimeMillis() > expiresAt;
    }
}`,

    n:2, title:'TTL + expiry + LRU eviction',
    badge:'Core features', badgeBg:'#EEEDFE', badgeTxt:'#3C3489',
    goal:'Keys expire automatically. When memory exceeds a threshold, LRU eviction kicks in. You\'ve now replicated Redis\'s two most important memory management mechanisms.',
    tasks:[
      {t:'TTL support', d:'SET key value EX 30 sets a 30-second TTL. On GET, check isExpired() — return null and schedule deletion if yes.'},
      {t:'Lazy expiry', d:'Don\'t scan all keys constantly. Check on access (lazy) + a background thread that scans a random 20% of keys every 100ms (Redis approach).'},

      {t:'Memory threshold', d:'Track approximate memory usage. When > MAX_MEMORY, evict least recently used keys until below 80% threshold.'},
      {t:'EXPIRE command', d:'EXPIRE key 60 sets TTL on existing key. TTL key returns remaining seconds. PERSIST key removes expiry.'},

    code:`// LRUCache.java — O(1) get and put
public class LRUCache {
    private final int capacity;
    private final Map<String, Node> map = new HashMap<>();
    private final Node head = new Node(), tail = new Node();

    public LRUCache(int capacity) {
        this.capacity = capacity;
        head.next = tail; tail.prev = head;
    }
    public String get(String key) {
        if (!map.containsKey(key)) return null;
        Node node = map.get(key);
        remove(node); addToFront(node); // mark as recently used
        return node.value;
    }
    public void put(String key, String value) {
        if (map.containsKey(key)) remove(map.get(key));
        Node node = new Node(key, value);
        addToFront(node); map.put(key, node);
        if (map.size() > capacity) {
            Node lru = tail.prev;
            remove(lru); map.remove(lru.key);
        }
    }
}`,
    learns:['LRU from scratch (LeetCode 146 — for real)','Background thread scheduling','Memory estimation in Java','Lazy vs eager expiry trade-offs'],
    interview:'This is the deepest dive an interviewer will take. Be ready to whiteboard LRU from scratch, explain why O(1) requires both a hashmap AND a linked list, and explain why Redis uses lazy expiry rather than a full scan.'

      {t:'AOF rewrite', d:'If AOF grows too large, compact it: for each live key, write one SET command. Atomic swap of old vs new file.'},
      {t:'Snapshot (RDB-style)', d:'Background thread serialises the full keyspace to a binary file every N seconds or every M writes. Use Java serialisation or a simple binary format.'},
      {t:'Crash recovery', d:'On startup: if AOF exists, replay it. If only snapshot exists, load it. If both, AOF wins (more recent).'},
      {t:'fsync strategy', d:'AOF with fsync every write = safe but slow. fsync every second = small data loss risk but fast. Make it configurable.'},
    ],
    code:`// AOFWriter.java — append every command
public class AOFWriter {
    private final BufferedWriter writer;

    public void log(String command) throws IOException {
        writer.write(command);
        writer.newLine();
        writer.flush(); // fsync on every write (safe mode)
    }

    // AOF replay on startup
    public void replay(KVStore store, Path aofPath)
            throws IOException {
        try (var lines = Files.lines(aofPath)) {
            lines.forEach(line ->
                store.execute(CommandParser.parse(line)));
        }
    }
}`,
    learns:['Write-Ahead Log (WAL) — used by every database','Atomic file operations in Java','Serialisation formats (text vs binary)','fsync and durability guarantees'],
    interview:'WAL is in every system design interview. "How does your database guarantee durability?" The answer is always some variant of what you just built. You can now answer from experience.'
  },

    badge:'Distribution', badgeBg:'#FAECE7', badgeTxt:'#712B13',
    goal:'One primary node accepts writes. One or more replicas stay in sync. You\'ve implemented the most fundamental distributed systems pattern — this is how every database scales reads.',
    tasks:[
      {t:'Replication protocol', d:'Primary keeps a replication backlog (circular buffer of recent commands). Replica connects, sends REPLCONF, primary streams backlog then live commands.'},
      {t:'Replica server', d:'Starts as a regular KVStore but connects to primary on startup. Applies every command it receives — read-only to external clients.'},
      {t:'Offset tracking', d:'Each command gets an offset (like a Kafka offset). Replica tracks its offset. On reconnect, it asks for commands from last known offset.'},
      {t:'Partial resync', d:'If replica has been offline briefly, send only missed commands. If too far behind, send a full snapshot (RDB transfer) then stream live.'},
      {t:'WAIT command', d:'Client sends WAIT 1 100 — block until at least 1 replica has acknowledged, or 100ms timeout. Implements synchronous replication.'},
    ],
    code:`// ReplicationManager.java (primary side)
public class ReplicationManager {
    private final List<ReplicaConnection> replicas
        = new CopyOnWriteArrayList<>();
    private final RingBuffer<String> backlog
        = new RingBuffer<>(1_000_000);
    private final AtomicLong offset = new AtomicLong(0);

    public void propagate(String command) {
        long cmdOffset = offset.incrementAndGet();
        backlog.append(command);
        for (ReplicaConnection r : replicas) {
            r.sendAsync(cmdOffset + " " + command);
        }
    }
    public void syncReplica(ReplicaConnection r,
            long fromOffset) {
        if (backlog.contains(fromOffset)) {
            backlog.stream(fromOffset)
                   .forEach(r::sendAsync); // partial resync
        } else {
            sendFullSnapshot(r); // too far behind
        }
    }
}`,
    learns:['Primary-replica replication (used in MySQL, Redis, Postgres)','Circular/ring buffers','Partial vs full resync — same logic as Redis PSYNC','Synchronous vs asynchronous replication trade-offs'],
    interview:'This is a senior-level conversation. Interviewers ask: how do you handle replica lag? What happens if primary crashes before replica syncs? What\'s the replication factor needed for no data loss? You now have real answers.'
  },
  {
    n:5, title:'HTTP API + CLI client + polish',
    badge:'Interface', badgeBg:'#E6F1FB', badgeTxt:'#0C447C',

    tasks:[

      {t:'CLI client', d:'kv-cli tool. Reads commands from stdin, sends to server via TCP, prints responses. Like redis-cli but yours.'},
      {t:'Benchmarking', d:'Write a throughput benchmark: 100k SET operations, measure ops/sec. Compare single-threaded vs thread pool vs ConcurrentHashMap locking.'},
      {t:'README + architecture doc', d:'Draw the architecture. Document every design decision and why. This is what interviewers read before the interview.'},

services:

      {t:'Node failure', d:'If a node is unreachable, mark it down. Route its keys to its replica. Promote replica to primary automatically.'},

    code:`// ConsistentHashRing.java
public class ConsistentHashRing {
    private final TreeMap<Long, String> ring = new TreeMap<>();
    private static final int VNODES = 150;

    public void addNode(String nodeId) {
        for (int i = 0; i < VNODES; i++) {
            long hash = hash(nodeId + "#" + i);
            ring.put(hash, nodeId);
        }
    }
    public String getNode(String key) {
        if (ring.isEmpty()) return null;
        long hash = hash(key);
        Map.Entry<Long, String> entry
            = ring.ceilingEntry(hash);
        // wrap around the ring
        return entry != null
            ? entry.getValue()
            : ring.firstEntry().getValue();
    }
}`,
    learns:['Consistent hashing — used in Cassandra, DynamoDB, Redis Cluster','Virtual nodes and why they reduce hotspots','Automatic failover logic','This alone is worth 20 minutes of interview conversation'],
    interview:'If you finish this, you walk into a system design interview and say "I implemented consistent hashing with virtual nodes from scratch." The interviewer will spend most of the interview asking about your project rather than giving you a theoretical problem.'

const INTERVIEW_QS = [
  {q:'How does your LRU eviction work?', a:'Doubly linked list + HashMap gives O(1) get and put. On access, move node to front. On eviction, remove from tail. Same as LeetCode 146 — but I built it into a real system.'},
  {q:'Why ConcurrentHashMap instead of synchronized HashMap?', a:'ConcurrentHashMap uses segment-level locking (Java 8+: CAS + synchronized on individual bins) rather than locking the entire map. Reads are lock-free. This means multiple threads can read simultaneously — critical for a read-heavy cache.'},
  {q:'How does your replication handle a primary crash?', a:'Replicas track their replication offset. On reconnect, they send their last known offset and request a partial resync from the backlog. If too far behind, they request a full snapshot. For automatic failover, a health-check thread detects primary unavailability and promotes the most up-to-date replica.'},
  {q:'What happens if two clients SET the same key concurrently?', a:'ConcurrentHashMap\'s put is atomic for a single operation. Last write wins — which is the correct behaviour for a cache. For strict atomicity you\'d need WATCH/MULTI/EXEC transactions, which I\'d add in a next iteration.'},
  {q:'How does AOF differ from a snapshot?', a:'AOF logs every write command — it\'s the WAL pattern. On crash, you replay the log to reconstruct state. A snapshot serialises the entire keyspace at a point in time — faster to restore but you lose writes since the last snapshot. AOF + snapshot together give you the best of both: fast recovery via snapshot, then replay only the AOF delta since that snapshot.'},
  {q:'How would you scale reads beyond one replica?', a:'Add more replicas and put a load balancer in front of them. Reads are distributed across replicas, writes go only to primary. This is the read replica pattern used by MySQL, Postgres, and Redis in production.'},
  {q:'What\'s the memory footprint of your LRU node?', a:'Each Node object has a key (String ref), value (String ref), prev and next pointers — approximately 48 bytes per node on a 64-bit JVM. For 1M entries that\'s ~48MB for the structure alone, plus the actual key/value data.'},
  {q:'How does consistent hashing reduce resharding cost?', a:'In a naive hash (key % N), adding a node changes the assignment of almost every key. With consistent hashing, only keys in the new node\'s range move — approximately 1/N of total keys. With virtual nodes, load is distributed more evenly so no single physical node becomes a hotspot.'},
];
